name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['**/*.md']
  pull_request:
    branches: [main]
    paths-ignore: ['**/*.md']

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v5
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v5
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v5
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Verify dist outputs
        run: |
          test -f dist/index.js
          test -f dist/index.cjs
          test -f dist/index.d.ts
          test -f dist/index.d.cts
          echo "All expected build outputs present."

      - name: Check package contents
        run: |
          pnpm pack 2>&1
          ls -lh *.tgz
          tar tzf *.tgz | head -30

  dco-check:
    name: DCO Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check DCO sign-off
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          COMMITS=$(git log --format='%H %s' "$BASE_SHA".."$HEAD_SHA")
          MISSING=""
          while IFS= read -r line; do
            SHA=$(echo "$line" | cut -d' ' -f1)
            BODY=$(git log -1 --format='%B' "$SHA")
            if ! echo "$BODY" | grep -qi "^Signed-off-by:"; then
              MISSING="$MISSING\n  - $(echo "$line" | cut -d' ' -f2-) ($SHA)"
            fi
          done <<< "$COMMITS"
          if [ -n "$MISSING" ]; then
            echo "::error::The following commits are missing DCO sign-off (git commit -s):$MISSING"
            exit 1
          fi
          echo "All commits have DCO sign-off."
